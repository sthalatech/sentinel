# Sentinel Loop example policy - Odoo-focused.
#
# This is an illustration; copy it, tune it to your environment, and reference
# it from your live config via the AGT_POLICY_PATH environment variable.
#
# Action names come from the remediation actionbook (config/actions.example.yml
# -> copy to config/actions.yml). The actionbook is declarative: a community
# user adds an environment-specific remediation by appending a block there and
# listing the new action name below - no code change. Validate both together:
#   sentinel actions validate config/actions.yml
#
# The policy references trust levels defined in governance/agentaz.example.json.
# When global trust drops to A1 the loop enters lockdown and only escalates.

policy:
  version: "1.0"
  trust_ladder: "governance/agentaz.example.json"

  # Actions the active remediator may attempt without extra approval.
  # Names must match an action in config/actions.yml.
  tool_allowlist:
    - requeue_queue_job        # requeue a stuck OCA queue.job
    - retry_mail_queue         # retry an outgoing mail.mail in exception/outgoing
    - reset_cron_lock          # release an ir.cron stuck running
    - recompute_stored_field   # invariant-safe reconcile of a drifted computed field

  # Actions that always require explicit human approval, regardless of trust.
  # These carry blast_radius: high in the actionbook; the remediator refuses to
  # surface them at A4 even if a typo lists them in tool_allowlist above.
  require_approval:
    - reset_posted_invoice     # account.move.button_draft - touches the legal ledger
    - uninstall_module         # ir.module.module uninstall - deletes data

  # Trust-level-specific approval gates.
  # Anything listed here is blocked unless approved by a human in the tracker.
  approval_gates:
    A4: []                                    # routine autonomy
    A3: [reconcile_move_line]                 # touches accounting entries
    A2: [scale_resource, run_stock_scheduler] # impactful ops need approval
    A1: []                                    # lockdown: no tools run

  # How the global trust level reacts to unresolved incidents.
  demotion:
    mode: "global"        # one shared trust level across all incidents
    step: 1               # drop one level per unresolved incident
    floor: "A1"           # never demote below lockdown

  # Escalation rules for incidents that cannot be auto-resolved.
  escalation:
    max_attempts: 3
    on_lockdown: notify_human_everywhere
